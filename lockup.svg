<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 186" width="320" height="372">
  <!-- vonArgo lockup: egg; asymmetric lemniscate fracture (? whose loop re-enters) + heavy tail + shard dot;
       circuit-trace branches with via pads; cold-plate depression line -->
  <g transform="translate(20,10)">
    <path d="M60 6 C 88 6, 112 48, 112 92 C 112 126, 89 144, 60 144 C 31 144, 8 126, 8 92 C 8 48, 32 6, 60 6 Z"
          fill="none" stroke="#2e3c47" stroke-width="4"/>
    <g stroke="#b4622d" fill="none" stroke-linecap="square" stroke-linejoin="miter">
      <!-- main ? bowl -->
      <path d="M54 58 L46 38 L60 28 L76 33 L84 47 L79 61 L66 68 L54 58" stroke-width="4.5"/>
      <!-- re-entry lobe -->
      <path d="M54 58 L42 62 L40 72 L50 74 L58 66" stroke-width="4.5"/>
      <!-- tail: the ! stroke, heavier -->
      <path d="M58 66 L61 80 L60 94" stroke-width="6.5"/>
      <!-- circuit-trace branches: orthogonal runs -->
      <path d="M46 38 L46 31 L39 31" stroke-width="2.5"/>
      <path d="M76 33 L76 25 L83 25" stroke-width="2.5"/>
      <path d="M84 47 L93 47 L93 54" stroke-width="2.5"/>
      <path d="M79 61 L88 61 L88 69" stroke-width="2.5"/>
      <path d="M40 72 L32 72 L32 80" stroke-width="2.5"/>
      <path d="M61 80 L70 80 L70 87" stroke-width="2.5"/>
    </g>
    <!-- via pads at trace ends -->
    <g fill="#b4622d">
      <circle cx="39" cy="31" r="2.6"/><circle cx="83" cy="25" r="2.6"/>
      <circle cx="93" cy="54" r="2.6"/><circle cx="88" cy="69" r="2.6"/>
      <circle cx="32" cy="80" r="2.6"/><circle cx="70" cy="87" r="2.6"/>
    </g>
    <!-- the dot: shard-hole, slightly heavier -->
    <g stroke="#b4622d" fill="none" stroke-width="5"><circle cx="60" cy="113" r="7.5"/></g>
    <g stroke="#b4622d" fill="none" stroke-width="2.2">
      <path d="M60 105 L60 100"/><path d="M67 109 L72 105"/><path d="M53 109 L48 105"/>
      <path d="M60 121 L60 127"/><path d="M67 117 L72 121"/>
    </g>
  </g>
  <path d="M8 146 L50 146 L50 160 L110 160 L110 146 L152 146"
        fill="none" stroke="#2e3c47" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>