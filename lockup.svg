<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 186" width="320" height="372">
  <!-- vonArgo lockup v4: egg; open irregular ?-bowl whose two ends CROSS below (the loop never closes);
       left end continues as the ! tail to the shard dot; right end terminates in a via.
       Circuit-trace branches with via pads. Cold-plate depression line. -->
  <g transform="translate(20,10)">
    <path d="M60 6 C 88 6, 112 48, 112 92 C 112 126, 89 144, 60 144 C 31 144, 8 126, 8 92 C 8 48, 32 6, 60 6 Z"
          fill="none" stroke="#2e3c47" stroke-width="4"/>
    <g stroke="#b4622d" fill="none" stroke-linecap="square" stroke-linejoin="miter">
      <!-- bowl: irregular, open at the bottom; left end at (46,64), right end at (66,70) -->
      <path d="M46 64 L39 49 L47 34 L62 28 L78 35 L83 50 L76 63 L66 70" stroke-width="4.5"/>
      <!-- right leg: from bowl end, down-left, short, ends in via -->
      <path d="M66 70 L54 82 L50 89" stroke-width="4.5"/>
      <!-- left leg: from bowl start, down-right CROSSING the right leg (~57,76), becoming the tail -->
      <path d="M46 64 L61 79 L60 94" stroke-width="5.5"/>
      <!-- circuit-trace branches -->
      <path d="M47 34 L47 26 L40 26" stroke-width="2.5"/>
      <path d="M78 35 L84 28" stroke-width="2.5"/>
      <path d="M83 50 L92 50 L92 58" stroke-width="2.5"/>
      <path d="M39 49 L30 49 L30 42" stroke-width="2.5"/>
    </g>
    <g fill="#b4622d">
      <circle cx="50" cy="89" r="3"/>
      <circle cx="40" cy="26" r="2.6"/><circle cx="84" cy="28" r="2.6"/>
      <circle cx="92" cy="58" r="2.6"/><circle cx="30" cy="42" r="2.6"/>
    </g>
    <g stroke="#b4622d" fill="none" stroke-width="5"><circle cx="60" cy="113" r="7.5"/></g>
    <g stroke="#b4622d" fill="none" stroke-width="2.2">
      <path d="M60 105 L60 100"/><path d="M67 109 L72 105"/><path d="M53 109 L48 105"/>
      <path d="M60 121 L60 127"/><path d="M67 117 L72 121"/>
    </g>
  </g>
  <path d="M8 146 L50 146 L50 160 L110 160 L110 146 L152 146"
        fill="none" stroke="#2e3c47" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>